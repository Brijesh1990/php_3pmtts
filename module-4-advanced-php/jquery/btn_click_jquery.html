<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='https://code.jquery.com/jquery-3.7.1.js'></script>
</head>
<body>

    <script>
        jQuery(document).ready(function(){
            jQuery("#content").css({"background-color":"coral","padding":"25px","width":"20%"});
            
            jQuery("button").css({"background-color":"black","padding":"5px","width":"70%","color":"white"});

            // perform some calculations 
            jQuery("#btn").click(function(){
                var a=parseInt(prompt('Enter a values :'));
                
                var b=parseInt(prompt('Enter b values :'));
                var c=a+b;
                alert('Additions of numbers is :'+c)
            }) 
        })
    </script>
    <div id="content">
    <button type="button" id="btn">Click Me</button>
    </div>
</body>
</html>
